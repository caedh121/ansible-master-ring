namespace: master_ring
name: windows_remote
version: 1.0.0
readme: README.md
authors:
  - Adrian Estrada <caedh121@gmail.com>
description: >
  Ansible roles for managing Windows VMs from a Linux controller across AWS, Azure,
  and GCP using cloud-native tunnels (SSM, Bastion, IAP). Includes readiness checks
  and multi-transport reboot support.
license:
  - MIT
tags:
  - windows
  - winrm
  - aws
  - azure
  - gcp
  - ssm
  - bastion
  - iap
  - tunnel
dependencies:
  # win_readiness uses ansible.windows.win_powershell, added in 1.5.0.
  ansible.windows: ">=1.5.0"
  # generate_rdp uses community.general.archive + community.general.mail.
  # Cap below 11.x because community.general 11+ requires ansible-core
  # 2.19+, which is outside our supported range (2.15-2.17). 10.x is
  # the latest that works with ansible-core 2.17.
  community.general: ">=3.0.0,<11.0.0"
repository: https://github.com/caedh121/ansible-master-ring
documentation: https://github.com/caedh121/ansible-master-ring/blob/main/ansible/README.md
homepage: https://github.com/caedh121/ansible-master-ring
issues: https://github.com/caedh121/ansible-master-ring/issues
build_ignore:
  - rdp_artifacts
  - "*.tar.gz"
